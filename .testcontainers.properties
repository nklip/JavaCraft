# Testcontainers global configuration
# Copy to ~/.testcontainers.properties for local dev reuse.

# Keep containers alive between test runs on dev machines (faster iteration).
# Requires containers to be created with .withReuse(true).
testcontainers.reuse.enable=true

# Uncomment to route all Docker Hub pulls through a company mirror registry:
# testcontainers.hub.image.name.prefix=registry.company.com/mirror/

# Uncomment to pin the Ryuk sidecar image (cleanup container):
# ryuk.container.image=testcontainers/ryuk:0.7.0
