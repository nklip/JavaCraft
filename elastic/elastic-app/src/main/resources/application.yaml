scheduler:
  enabled: true
search:
  fuzzy:
    fuzziness: "2"
  interval:
    max-gaps: 3
  span:
    slop: 3
server:
  port: "8001"
spring:
  elastic:
    cluster:
      host: "localhost"
      port: "9200"
      user: "elastic"
      pass: "FverGoe0"
      ssl:
        enabled: false
        path: "cert/http_ca.crt" # the same certificate which Kibana uses to connect to elastic search instance
      timeout:
        connect-ms: 3000
        socket-ms: 10000
        request-ms: 2000
      retry:
        max-attempts: 3
        initial-backoff-ms: 200
        max-backoff-ms: 2000
springdoc:
  swagger-ui:
    # Tag groups (controllers) sorted A -> Z
    tagsSorter: alpha
    # Operations sorted A -> Z by path within each tag
    operationsSorter: alpha
