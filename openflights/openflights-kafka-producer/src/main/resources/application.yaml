server:
  port: 8051

spring:
  kafka:
    bootstrap-servers: localhost:9092

openflights:
  kafka:
    route-topic-partitions: 8

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    # Tag groups (controllers) sorted A -> Z
    tagsSorter: alpha
    # Operations sorted A -> Z by path within each tag
    operationsSorter: alpha
